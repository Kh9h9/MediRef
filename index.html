<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MediRef · الموسوعة الطبية الشاملة · أنابيب دقيقة لكل تحليل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #f8fafc;
  --border: #e2e8f0;
  --text: #0f172a;
  --text2: #475569;
  --text3: #94a3b8;
  --teal: #0d9488;
  --teal-light: #ccfbf1;
  --teal-dark: #0f766e;
  --navy: #0c1e35;
  --accent: #f97316;
  --accent-light: #fff7ed;
  --danger: #ef4444;
  --danger-light: #fef2f2;
  --gold: #f59e0b;
  --gold-light: #fffbeb;
  --purple: #8b5cf6;
  --purple-light: #ede9fe;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 16px rgba(0,0,0,0.07), 0 2px 6px rgba(0,0,0,0.04);
  --shadow-lg: 0 20px 50px rgba(0,0,0,0.12);
  --radius: 20px;
  --radius-sm: 12px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #0a0f1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d42;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --teal-light: #0d2e2a;
  --accent-light: #2a1a0a;
  --danger-light: #2a0f0f;
  --gold-light: #2a2000;
  --purple-light: #2d2742;
  --shadow: 0 4px 16px rgba(0,0,0,0.3);
  --shadow-lg: 0 20px 50px rgba(0,0,0,0.5);
}
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html {
  scroll-behavior: smooth;
}
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  transition: background var(--transition), color var(--transition);
}
::-webkit-scrollbar {
  width: 5px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 99px;
}
.app-wrapper {
  max-width: 1400px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  background: var(--bg);
}
@media (min-width: 768px) {
  .app-wrapper {
    padding: 0 24px;
  }
}
@media (min-width: 1200px) {
  .app-wrapper {
    padding: 0 32px;
  }
}
.header {
  background: var(--navy);
  padding: 32px 20px 28px;
  position: relative;
  overflow: hidden;
  border-radius: 0 0 28px 28px;
  margin-bottom: 8px;
}
.header::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -60px;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(13, 148, 136, 0.3), transparent 70%);
}
.header::after {
  content: '';
  position: absolute;
  bottom: -40px;
  left: -40px;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(249, 115, 22, 0.15), transparent 70%);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 16px;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--teal), #06b6d4);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
  box-shadow: 0 4px 12px rgba(13, 148, 136, 0.4);
}
.logo-text h1 {
  font-size: 22px;
  font-weight: 800;
  color: white;
  letter-spacing: -0.5px;
  line-height: 1;
}
.logo-text span {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.5);
  font-weight: 400;
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  position: relative;
  z-index: 1;
}
.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  color: rgba(255, 255, 255, 0.8);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: var(--transition);
  backdrop-filter: blur(8px);
}
.icon-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  color: white;
}
.icon-btn.active {
  background: var(--teal);
  color: white;
}
.header-stats {
  display: flex;
  gap: 12px;
  position: relative;
  z-index: 1;
  flex-wrap: wrap;
}
.stat-pill {
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 30px;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(8px);
}
.stat-pill strong {
  color: white;
  font-weight: 700;
}
.search-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 0;
  position: sticky;
  top: 0;
  z-index: 900;
  box-shadow: var(--shadow-sm);
  transition: background var(--transition);
}
@media (min-width: 768px) {
  .search-bar {
    border-radius: 24px;
    margin: 0 0 16px 0;
    padding: 14px 24px 0;
  }
}
.search-input-wrapper {
  position: relative;
  margin-bottom: 12px;
}
.search-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text3);
  font-size: 15px;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 11px 42px 11px 42px;
  border-radius: 50px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  font-size: 15px;
  font-family: 'Tajawal', sans-serif;
  color: var(--text);
  outline: none;
  transition: var(--transition);
}
#searchInput:focus {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
  background: var(--surface);
}
#searchInput::placeholder {
  color: var(--text3);
}
.clear-btn {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--border);
  border: none;
  color: var(--text2);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  transition: var(--transition);
}
.clear-btn.visible {
  display: flex;
}
.clear-btn:hover {
  background: var(--danger);
  color: white;
}
.cats-scroll {
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding-bottom: 12px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.cats-scroll::-webkit-scrollbar {
  display: none;
}
.cat-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 30px;
  padding: 5px 13px;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--text2);
  white-space: nowrap;
  cursor: pointer;
  transition: var(--transition);
  font-family: 'Tajawal', sans-serif;
  flex-shrink: 0;
}
.cat-chip .chip-count {
  background: var(--border);
  color: var(--text3);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 30px;
  font-family: 'JetBrains Mono', monospace;
  transition: var(--transition);
}
.cat-chip:hover {
  border-color: var(--teal);
  color: var(--teal);
}
.cat-chip.active {
  background: var(--navy);
  border-color: var(--navy);
  color: white;
}
[data-theme="dark"] .cat-chip.active {
  background: var(--teal);
  border-color: var(--teal);
}
.cat-chip.active .chip-count {
  background: rgba(255, 255, 255, 0.2);
  color: white;
}
.results-bar {
  padding: 14px 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.results-count {
  font-size: 13px;
  color: var(--text3);
  font-family: 'JetBrains Mono', monospace;
}
.results-count strong {
  color: var(--teal);
  font-weight: 700;
}
.view-toggle {
  display: flex;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  gap: 3px;
}
.view-btn {
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 9px;
  font-size: 13px;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: 'Tajawal', sans-serif;
  font-weight: 500;
  font-size: 15px;
}
.view-btn i {
  font-size: 18px;
}
.view-label {
  font-size: 12px;
}
.view-btn.active {
  background: var(--teal);
  color: white;
  box-shadow: var(--shadow-sm);
}
.view-btn:not(.active):hover {
  color: var(--teal);
  background: var(--teal-light);
}
.cards-container {
  padding: 0 14px 100px;
}
.cards-container.view-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.cards-container.view-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (min-width: 640px) {
  .cards-container.view-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
}
@media (min-width: 1024px) {
  .cards-container.view-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
}
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  animation: cardIn 0.25s ease both;
}
.card:hover {
  border-color: var(--teal);
  box-shadow: 0 8px 24px rgba(13, 148, 136, 0.12);
  transform: translateY(-2px);
}
.card:active {
  transform: scale(0.98);
}
@keyframes cardIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.card.list-card {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.card.list-card .card-icon-wrap {
  width: 46px;
  height: 46px;
  flex-shrink: 0;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.card.list-card .card-body {
  flex: 1;
  min-width: 0;
}
.card.list-card .card-abbr {
  font-size: 17px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
}
.card.list-card .card-name {
  font-size: 13px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card.list-card .card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
}
.card.list-card .cat-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
}
.card.list-card .card-arrow {
  color: var(--text3);
  font-size: 13px;
  flex-shrink: 0;
  transition: var(--transition);
}
.card:hover .card-arrow {
  color: var(--teal);
  transform: translateX(-3px);
}
.card.grid-card {
  padding: 14px 12px;
}
.card.grid-card .card-icon-wrap {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-bottom: 10px;
}
.card.grid-card .card-abbr {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 2px;
}
.card.grid-card .card-name {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}
.card.grid-card .cat-tag {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  display: inline-block;
}
.fav-dot {
  position: absolute;
  top: 10px;
  left: 10px;
  width: 8px;
  height: 8px;
  background: var(--accent);
  border-radius: 50%;
  display: none;
}
.card.is-fav .fav-dot {
  display: block;
}
.cat-دم {
  background: #fee2e2;
  color: #b91c1c;
}
.cat-كيمياء {
  background: #dbeafe;
  color: #1d4ed8;
}
.cat-هرمونات {
  background: #f3e8ff;
  color: #7c3aed;
}
.cat-فيتامينات {
  background: #fef9c3;
  color: #a16207;
}
.cat-أورام {
  background: #ffe4e6;
  color: #be123c;
}
.cat-مناعة {
  background: #dcfce7;
  color: #15803d;
}
.cat-سوائل {
  background: #e0f2fe;
  color: #0369a1;
}
.cat-وراثة {
  background: #e9e5ff;
  color: #5b21b6;
}
.cat-أحياء مجهرية {
  background: #ffe0b5;
  color: #b45309;
}
[data-theme="dark"] .cat-دم {
  background: #3f1212;
  color: #fca5a5;
}
[data-theme="dark"] .cat-كيمياء {
  background: #1e2d4a;
  color: #93c5fd;
}
[data-theme="dark"] .cat-هرمونات {
  background: #2e1f4a;
  color: #c4b5fd;
}
[data-theme="dark"] .cat-فيتامينات {
  background: #3a2d00;
  color: #fde68a;
}
[data-theme="dark"] .cat-أورام {
  background: #3f1020;
  color: #fda4af;
}
[data-theme="dark"] .cat-مناعة {
  background: #0f2e1e;
  color: #86efac;
}
[data-theme="dark"] .cat-سوائل {
  background: #0c2233;
  color: #7dd3fc;
}
[data-theme="dark"] .cat-وراثة {
  background: #2e1a6b;
  color: #c4b5fd;
}
[data-theme="dark"] .cat-أحياء مجهرية {
  background: #4c2f0a;
  color: #fcd34d;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state i {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.4;
}
.empty-state h3 {
  font-size: 18px;
  color: var(--text2);
  margin-bottom: 6px;
}
.empty-state p {
  font-size: 14px;
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(12px);
  z-index: 1000;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.open {
  display: flex;
}
.modal-sheet {
  background: var(--surface);
  width: 100%;
  max-width: 520px;
  max-height: 92vh;
  border-radius: 28px 28px 0 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: sheetUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  box-shadow: var(--shadow-lg);
}
@media (min-width: 640px) {
  .modal-sheet {
    max-width: 600px;
    border-radius: 28px;
    margin-bottom: 20px;
    max-height: 90vh;
  }
  .modal-overlay {
    align-items: center;
  }
  @keyframes sheetUp {
    from {
      transform: scale(0.95);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }
}
.modal-drag-handle {
  width: 36px;
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  margin: 12px auto 0;
  flex-shrink: 0;
}
.modal-header-zone {
  padding: 16px 20px 0;
  flex-shrink: 0;
}
.modal-top-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.modal-abbr-block {
  flex: 1;
}
.modal-abbr {
  font-size: 32px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -0.5px;
}
.modal-name {
  font-size: 16px;
  color: var(--text2);
  font-weight: 400;
  margin-top: 2px;
}
.modal-name-en {
  font-size: 14px;
  color: var(--text3);
  font-weight: 300;
  margin-top: 2px;
  font-style: italic;
}
.modal-cat-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 30px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 8px;
}
.modal-actions-row {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.modal-action-btn {
  width: 40px;
  height: 40px;
  border-radius: 13px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: var(--transition);
}
.modal-action-btn:hover {
  border-color: var(--teal);
  color: var(--teal);
}
.modal-action-btn.fav-active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}
.modal-divider {
  height: 1px;
  background: var(--border);
  margin: 14px 0 0;
}
.modal-tabs {
  display: flex;
  gap: 0;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.modal-tabs::-webkit-scrollbar {
  display: none;
}
.tab-btn {
  background: none;
  border: none;
  padding: 12px 14px 11px;
  font-size: 13.5px;
  font-family: 'Tajawal', sans-serif;
  font-weight: 500;
  color: var(--text3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
  white-space: nowrap;
  margin-bottom: -1px;
}
.tab-btn.active {
  color: var(--teal);
  border-bottom-color: var(--teal);
  font-weight: 700;
}
.modal-body {
  overflow-y: auto;
  padding: 20px 20px 40px;
  flex: 1;
}
.tab-pane {
  display: none;
}
.tab-pane.active {
  display: block;
}
.info-card {
  background: var(--surface2);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
}
.info-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.info-card-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.icon-teal {
  background: var(--teal-light);
  color: var(--teal);
}
.icon-accent {
  background: var(--accent-light);
  color: var(--accent);
}
.icon-gold {
  background: var(--gold-light);
  color: var(--gold);
}
.icon-danger {
  background: var(--danger-light);
  color: var(--danger);
}
.icon-purple {
  background: var(--purple-light);
  color: var(--purple);
}
.info-card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.info-card-body {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
}
.tube-card {
  background: var(--surface2);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 12px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}
.tube-icon {
  width: 56px;
  height: 56px;

// ==================== STATE ====================
const state = {
  activeCat: 'الكل',
  searchTerm: '',
  viewMode: 'list',
  favorites: JSON.parse(localStorage.getItem('mediref_favs') || '[]'),
  compareList: JSON.parse(localStorage.getItem('mediref_compare') || '[]'),
  currentView: 'home'
};

function saveFavs() {
  localStorage.setItem('mediref_favs', JSON.stringify(state.favorites));
}
function saveCompare() {
  localStorage.setItem('mediref_compare', JSON.stringify(state.compareList));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function getFilteredData() {
  let data = DB;
  if (state.activeCat !== 'الكل') data = data.filter(i => i.cat === state.activeCat);
  if (state.searchTerm) {
    const t = state.searchTerm.toLowerCase();
    data = data.filter(i =>
      i.abbr.toLowerCase().includes(t) ||
      i.name.includes(t) ||
      (i.name_en && i.name_en.toLowerCase().includes(t)) ||
      (i.desc && i.desc.includes(t)) ||
      (i.cat && i.cat.includes(t))
    );
  }
  return data;
}
function getCatColor(cat) {
  const map = { 'دم':'#b91c1c','كيمياء':'#1d4ed8','هرمونات':'#7c3aed','فيتامينات':'#a16207','أورام':'#be123c','مناعة':'#15803d','سوائل':'#0369a1','وراثة':'#5b21b6','أحياء مجهرية':'#b45309' };
  return map[cat] || '#475569';
}
function getCatBg(cat) {
  const map = { 'دم':'#fee2e2','كيمياء':'#dbeafe','هرمونات':'#f3e8ff','فيتامينات':'#fef9c3','أورام':'#ffe4e6','مناعة':'#dcfce7','سوائل':'#e0f2fe','وراثة':'#e9e5ff','أحياء مجهرية':'#ffe0b5' };
  return map[cat] || '#f1f5f9';
}

function renderCats() {
  const cats = ['الكل', ...new Set(DB.map(i => i.cat))];
  const counts = {};
  DB.forEach(i => { counts[i.cat] = (counts[i.cat] || 0) + 1; });
  document.getElementById('catsContainer').innerHTML = cats.map(c => {
    const count = c === 'الكل' ? DB.length : (counts[c] || 0);
    return `<button class="cat-chip ${c === state.activeCat ? 'active' : ''}" data-cat="${c}">${c}<span class="chip-count">${count}</span></button>`;
  }).join('');
  document.querySelectorAll('.cat-chip').forEach(el => {
    el.addEventListener('click', () => {
      state.activeCat = el.dataset.cat;
      renderCats();
      renderCards();
    });
  });
}
function buildCardHTML(item, mode) {
  const isFav = state.favorites.includes(item.abbr);
  const isCompare = state.compareList.includes(item.abbr);
  const bg = getCatBg(item.cat);
  const fg = getCatColor(item.cat);
  if (mode === 'list') {
    return `<div class="card list-card ${isFav ? 'is-fav' : ''}" data-abbr="${item.abbr}"><div class="fav-dot"></div><div class="card-icon-wrap" style="background:${bg}"><i class="fas ${item.icon || 'fa-flask'}" style="color:${fg}"></i></div><div class="card-body"><div class="card-abbr">${item.abbr}</div><div class="card-name">${item.name}</div><div class="card-meta"><span class="cat-tag cat-${item.cat}">${item.cat}</span>${isCompare ? '<span style="font-size:10px;color:var(--teal);font-weight:700"><i class="fas fa-check-circle"></i> مقارنة</span>' : ''}</div></div><i class="fas fa-chevron-left card-arrow"></i></div>`;
  } else {
    return `<div class="card grid-card ${isFav ? 'is-fav' : ''}" data-abbr="${item.abbr}"><div class="fav-dot"></div><div class="card-icon-wrap" style="background:${bg}"><i class="fas ${item.icon || 'fa-flask'}" style="color:${fg}"></i></div><div class="card-abbr">${item.abbr}</div><div class="card-name">${item.name}</div><span class="cat-tag cat-${item.cat}">${item.cat}</span></div>`;
  }
}
function renderCards() {
  const data = getFilteredData();
  document.getElementById('resultCount').textContent = data.length;
  const container = document.getElementById('cardsContainer');
  container.className = `cards-container view-${state.viewMode}`;
  if (data.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-magnifying-glass"></i><h3>لا توجد نتائج</h3><p>جرّب كلمة بحث مختلفة</p></div>`;
    return;
  }
  container.innerHTML = data.map(item => buildCardHTML(item, state.viewMode)).join('');
}
function renderFavCards() {
  const data = DB.filter(i => state.favorites.includes(i.abbr));
  const container = document.getElementById('favCardsContainer');
  container.className = 'cards-container view-list';
  if (data.length === 0) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-heart"></i><h3>المفضلة فارغة</h3><p>اضغط على ❤️ في أي تحليل لإضافته</p></div>`;
    return;
  }
  container.innerHTML = data.map(item => buildCardHTML(item, 'list')).join('');
}
function updateFavUI() {
  const count = state.favorites.length;
  document.getElementById('favBadge').textContent = count;
  document.getElementById('favBadge').style.display = count ? 'block' : 'none';
  document.getElementById('favStatCount').textContent = count;
  document.getElementById('favStatPill').style.display = count ? 'flex' : 'none';
}
function updateCompareUI() {
  const count = state.compareList.length;
  document.getElementById('compareBadge').textContent = count;
  document.getElementById('compareBadge').style.display = count ? 'block' : 'none';
}
function openModal(item) {
  const isFav = state.favorites.includes(item.abbr);
  const isCompare = state.compareList.includes(item.abbr);
  const bg = getCatBg(item.cat);
  const fg = getCatColor(item.cat);
  document.getElementById('modalHeaderZone').innerHTML = `
    <div class="modal-top-row"><div class="modal-abbr-block"><div class="modal-abbr">${item.abbr}</div><div class="modal-name">${item.name}</div><div class="modal-name-en">${item.name_en || ''}</div><span class="modal-cat-tag cat-${item.cat}"><i class="fas ${item.icon || 'fa-flask'}"></i> ${item.cat}</span></div><div class="modal-actions-row"><button class="modal-action-btn ${isFav ? 'fav-active' : ''}" id="modalFavBtn"><i class="fas fa-heart"></i></button><button class="modal-action-btn ${isCompare ? 'fav-active' : ''}" id="modalCompareBtn"><i class="fas fa-code-compare"></i></button></div></div><div class="modal-divider"></div>`;
  document.getElementById('modalTabs').innerHTML = `<button class="tab-btn active" data-tab="info">المعلومات</button><button class="tab-btn" data-tab="range">القيم الطبيعية</button><button class="tab-btn" data-tab="tube">نوع الأنبوب</button><button class="tab-btn" data-tab="prep">التحضير</button>`;
  const infoHTML = `<div class="info-card"><div class="info-card-header"><div class="info-card-icon icon-teal"><i class="fas fa-microscope"></i></div><div class="info-card-title">وصف التحليل</div></div><div class="info-card-body">${item.desc || 'لا يوجد وصف.'}</div></div>${item.advice && item.advice !== '---' ? `<div class="info-card"><div class="info-card-header"><div class="info-card-icon icon-gold"><i class="fas fa-lightbulb"></i></div><div class="info-card-title">نصائح مهمة</div></div><div class="info-card-body">${item.advice}</div></div>` : ''}${item.interactions && item.interactions !== '---' ? `<div class="info-card"><div class="info-card-header"><div class="info-card-icon icon-accent"><i class="fas fa-pills"></i></div><div class="info-card-title">التفاعلات الدوائية</div></div><div class="info-card-body">${item.interactions}</div></div>` : ''}${item.warning && item.warning !== '---' ? `<div class="warning-card"><i class="fas fa-triangle-exclamation"></i><p>${item.warning}</p></div>` : ''}<div class="disclaimer"><i class="fas fa-scale-balanced"></i><p>هذه المعلومات للأغراض التعليمية فقط. استشر طبيبك قبل أي قرار علاجي.</p></div>`;
  const rangeHTML = `<div class="range-display">${(item.range || '---').replace(/\n/g, '<br>')}</div><div class="disclaimer"><i class="fas fa-info-circle"></i><p>القيم المرجعية قد تختلف قليلاً بين المختبرات. دائماً راجع قيم مختبرك.</p></div>`;
  const tubeHTML = `<div class="tube-card"><div class="tube-icon" style="background:${getCatBg(item.cat)}; color:${getCatColor(item.cat)};"><i class="fas fa-vial"></i></div><div class="tube-details"><div class="tube-name">نوع الأنبوب المناسب</div><div class="tube-additive">${item.tube}</div></div></div><div class="tube-note"><i class="fas fa-info-circle" style="color:var(--teal)"></i><span>استخدم الأنبوب المحدد لضمان دقة النتائج وتجنب انحلال الدم أو تلوث العينة.</span></div>`;
  const prepHTML = `<div class="info-card"><div class="info-card-header"><div class="info-card-icon icon-gold"><i class="fas fa-vial"></i></div><div class="info-card-title">التحضير للتحليل</div></div><div class="info-card-body">${item.prepare || 'لا توجد شروط تحضير خاصة.'}</div></div><div class="disclaimer"><i class="fas fa-scale-balanced"></i><p>اتبع تعليمات مختبرك دائماً.</p></div>`;
  document.getElementById('modalBody').innerHTML = `<div class="tab-pane active" id="pane-info">${infoHTML}</div><div class="tab-pane" id="pane-range">${rangeHTML}</div><div class="tab-pane" id="pane-tube">${tubeHTML}</div><div class="tab-pane" id="pane-prep">${prepHTML}</div>`;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`pane-${btn.dataset.tab}`).classList.add('active');
    });
  });
  document.getElementById('modalFavBtn').addEventListener('click', () => {
    const idx = state.favorites.indexOf(item.abbr);
    if (idx === -1) { state.favorites.push(item.abbr); showToast('أُضيف إلى المفضلة ❤️'); }
    else { state.favorites.splice(idx, 1); showToast('حُذف من المفضلة'); }
    saveFavs(); updateFavUI(); renderCards(); renderFavCards();
    document.getElementById('modalFavBtn').classList.toggle('fav-active', state.favorites.includes(item.abbr));
  });
  document.getElementById('modalCompareBtn').addEventListener('click', () => {
    const idx = state.compareList.indexOf(item.abbr);
    if (idx === -1) {
      if (state.compareList.length >= 3) { showToast('الحد الأقصى 3 تحاليل للمقارنة'); return; }
      state.compareList.push(item.abbr);
      showToast('أُضيف للمقارنة ✅');
    } else {
      state.compareList.splice(idx, 1);
      showToast('حُذف من المقارنة');
    }
    saveCompare(); updateCompareUI(); renderCards();
    document.getElementById('modalCompareBtn').classList.toggle('fav-active', state.compareList.includes(item.abbr));
  });
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
function openCompare() {
  if (state.compareList.length < 2) { showToast('أضف تحليلين على الأقل للمقارنة'); return; }
  const items = state.compareList.map(abbr => DB.find(i => i.abbr === abbr)).filter(Boolean);
  const fields = [{ label: 'الاسم', key: 'name' },{ label: 'الاسم الإنجليزي', key: 'name_en' },{ label: 'التصنيف', key: 'cat' },{ label: 'النطاق الطبيعي', key: 'range' },{ label: 'التحضير', key: 'prepare' },{ label: 'نوع الأنبوب', key: 'tube' },{ label: 'تحذيرات', key: 'warning' }];
  const headerCols = items.map(i => `<th>${i.abbr}</th>`).join('');
  const rows = fields.map(f => `<tr><td class="row-label">${f.label}</td>${items.map(i => `<td>${(i[f.key] || '---').replace(/\n/g, '<br>')}</td>`).join('')}</tr>`).join('');
  document.getElementById('compareSheet').innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><h2><i class="fas fa-code-compare" style="color:var(--teal)"></i> مقارنة التحاليل</h2><button id="closeCompareBtn" style="background:var(--border);border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;">✕</button></div><div style="overflow-x:auto"><table class="compare-table"><thead><tr><th>الحقل</th>${headerCols}</tr></thead><tbody>${rows}</tbody></table></div><button id="clearCompareBtn" style="margin-top:16px;width:100%;background:var(--danger-light);color:var(--danger);border:1.5px solid #fecaca;border-radius:14px;padding:10px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer"><i class="fas fa-trash"></i> مسح قائمة المقارنة</button>`;
  document.getElementById('closeCompareBtn').addEventListener('click', () => { document.getElementById('compareOverlay').classList.remove('open'); document.body.style.overflow = ''; });
  document.getElementById('clearCompareBtn').addEventListener('click', () => { state.compareList = []; saveCompare(); updateCompareUI(); renderCards(); document.getElementById('compareOverlay').classList.remove('open'); document.body.style.overflow = ''; showToast('مُسحت قائمة المقارنة'); });
  document.getElementById('compareOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
document.getElementById('compareOverlay').addEventListener('click', e => { if (e.target === document.getElementById('compareOverlay')) { document.getElementById('compareOverlay').classList.remove('open'); document.body.style.overflow = ''; } });
function switchView(view) {
  state.currentView = view;
  document.getElementById('mainView').classList.toggle('hidden', view !== 'home');
  document.getElementById('favView').classList.toggle('open', view === 'fav');
  document.getElementById('navHome').classList.toggle('active', view === 'home');
  document.getElementById('navFav').classList.toggle('active', view === 'fav');
  if (view === 'fav') renderFavCards();
}
function applyTheme() {
  const isDark = document.body.dataset.theme === 'dark';
  document.getElementById('darkToggleBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
}
document.getElementById('darkToggleBtn').addEventListener('click', () => {
  const newTheme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
  document.body.dataset.theme = newTheme;
  localStorage.setItem('mediref_dark', newTheme === 'dark' ? '1' : '0');
  applyTheme();
});
const savedTheme = localStorage.getItem('mediref_dark');
if (savedTheme === '1') document.body.dataset.theme = 'dark';
applyTheme();

const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
let debounceTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    state.searchTerm = searchInput.value.trim();
    clearBtn.classList.toggle('visible', state.searchTerm.length > 0);
    renderCards();
  }, 300);
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  state.searchTerm = '';
  state.activeCat = 'الكل';
  clearBtn.classList.remove('visible');
  renderCats();
  renderCards();
});
document.getElementById('listViewBtn').addEventListener('click', () => { state.viewMode = 'list'; document.getElementById('listViewBtn').classList.add('active'); document.getElementById('gridViewBtn').classList.remove('active'); renderCards(); });
document.getElementById('gridViewBtn').addEventListener('click', () => { state.viewMode = 'grid'; document.getElementById('gridViewBtn').classList.add('active'); document.getElementById('listViewBtn').classList.remove('active'); renderCards(); });
document.getElementById('clearFavsBtn').addEventListener('click', () => { state.favorites = []; saveFavs(); updateFavUI(); renderFavCards(); renderCards(); showToast('مُسحت المفضلة'); });
document.getElementById('navHome').addEventListener('click', () => switchView('home'));
document.getElementById('navFav').addEventListener('click', () => switchView('fav'));
document.getElementById('navCompare').addEventListener('click', openCompare);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('cardsContainer').addEventListener('click', e => { const card = e.target.closest('.card'); if (card) { const item = DB.find(i => i.abbr === card.dataset.abbr); if (item) openModal(item); } });
document.getElementById('favCardsContainer').addEventListener('click', e => { const card = e.target.closest('.card'); if (card) { const item = DB.find(i => i.abbr === card.dataset.abbr); if (item) openModal(item); } });

document.getElementById('totalCount').textContent = DB.length;
renderCats();
renderCards();
updateFavUI();
updateCompareUI();
</script>
</body>
</html>
