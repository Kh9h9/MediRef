    <style>
        /* reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
        }

        /* حاوية رئيسية مناسبة للهاتف */
        .container {
            padding: 0 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* الهيدر */
        header {
            background: white;
            padding: 32px 16px 24px;
            text-align: center;
            border-bottom: 1px solid #e9edf2;
        }

        header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0b2d4b;
            letter-spacing: -0.3px;
        }

        header h1 i {
            color: #2a9d8f;
            margin-left: 6px;
            font-size: 28px;
        }

        header p {
            font-size: 15px;
            color: #556b84;
            max-width: 280px;
            margin: 6px auto 12px;
        }

        .badge {
            display: inline-block;
            background: #edf2f7;
            border: 1px solid #d0d9e4;
            color: #1e293b;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
        }

        /* شريط البحث الثابت */
        .search-section {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e9edf2;
            padding: 14px 0 10px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 12px;
        }

        .search-wrapper i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
        }

        #searchInput {
            width: 100%;
            padding: 12px 42px 12px 14px;
            border-radius: 50px;
            border: 1px solid #d0d9e4;
            background: white;
            font-size: 15px;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        #searchInput:focus {
            outline: none;
            border-color: #2a9d8f;
            box-shadow: 0 4px 12px rgba(42,157,143,0.1);
        }

        .clear-search {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        .clear-search.visible {
            display: block;
        }

        /* التصنيفات (قابلة للتمرير الأفقى) */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 8px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .cat-chip {
            background: #f1f5f9;
            border: 1px solid #d0d9e4;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 500;
            color: #2c3e50;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.1s;
        }

        .cat-chip.active {
            background: #0b2d4b;
            color: white;
            border-color: #0b2d4b;
        }

        /* شبكة البطاقات (عمودية) */
        .grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 20px 0 40px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 18px 16px;
            border: 1px solid #edf2f7;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: 0.15s;
        }

        .card:active {
            background: #fafbfc;
            transform: scale(0.99);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .card-category {
            background: #e2f0ef;
            color: #1e7e6d;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }

        .card-icon {
            font-size: 22px;
            color: #0b2d4b;
        }

        .card-abbr {
            font-size: 24px;
            font-weight: 700;
            color: #0b2d4b;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .card-name {
            font-size: 15px;
            color: #4a5b6e;
            margin-bottom: 12px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #6b7b8c;
            border-top: 1px solid #eef2f6;
            padding-top: 10px;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #8e9fb1;
            font-size: 15px;
        }

        /* النافذة المنبثقة (مودال) */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: flex-end;
            padding: 0;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 480px;
            max-height: 85vh;
            border-radius: 30px 30px 0 0;
            padding: 24px 20px 28px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            margin-bottom: 16px;
            padding-left: 40px;
        }

        .modal-header h2 {
            font-size: 28px;
            color: #0b2d4b;
        }

        .modal-header h3 {
            font-size: 17px;
            color: #5b6f86;
            font-weight: 400;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #f1f5f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #2c3e50;
        }

        .modal-section {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border-right: 4px solid #2a9d8f;
        }

        .modal-section.warning {
            border-right-color: #e76f51;
            background: #fff4f0;
        }

        .modal-section.treatment {
            background: #f0f9f7;
        }

        .modal-section h4 {
            font-size: 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1e293b;
        }

        .modal-section p {
            font-size: 14px;
            color: #334155;
        }

        .range-badge {
            background: #0b2d4b;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 8px;
        }

        .drug-suggestion {
            background: white;
            border-radius: 16px;
            padding: 14px;
            border: 1px solid #d0d9e4;
            font-size: 14px;
        }

        .disclaimer {
            background: #fff9e6;
            border-right: 4px solid #f4a261;
            border-radius: 16px;
            padding: 14px;
            font-size: 12px;
            color: #7b5800;
            margin-top: 16px;
        }

        /* تذييل */
        footer {
            text-align: center;
            padding: 20px 16px;
            font-size: 12px;
            color: #8e9fb1;
            border-top: 1px solid #e9edf2;
            background: white;
        }
    </style>
</head>

          range: "رجال >40 mg/dL، نساء >50 mg/dL", prepare: "صيام 9-12 ساعة", 
          desc: "البروتين الدهني مرتفع الكثافة، يساعد في إزالة الكوليسترول من الشرايين.",
          drug: "انخفاض: تمارين رياضية، نياسين، فيبرات.",
          advice: "الرياضة والمكسرات وزيت الزيتون ترفع HDL.",
          interactions: "الستاتين قد ترفع HDL قليلاً.",
          warning: "انخفاض HDL يزيد خطر أمراض القلب." },

        { abbr: "LDL", name: "كوليسترول ضار", cat: "كيمياء", icon: "fa-thumbs-down",
          range: "أقل من 100 mg/dL (مثالي)", prepare: "صيام 9-12 ساعة", 
          desc: "البروتين الدهني منخفض الكثافة، يترسب في الشرايين ويسبب تصلبها.",
          drug: "ارتفاع: ستاتين (أتورفاستاتين)، إيزيتمايب.",
          advice: "تجنب الدهون المشبعة والمتحولة.",
          interactions: "الستاتين هي الخيار الأول.",
          warning: "ارتفاع LDL >190 يحتاج علاج دوائي." },

        { abbr: "VLDL", name: "كوليسترول ضار جداً", cat: "كيمياء", icon: "fa-flask",
          range: "2-30 mg/dL", prepare: "صيام 9-12 ساعة", 
          desc: "يحمل الدهون الثلاثية، ارتفاعه مرتبط بأمراض القلب.",
          drug: "نفس علاج الدهون الثلاثية.",
          advice: "---",
          interactions: "---",
          warning: "---" }
    ];

    // ==================== متغيرات التطبيق ====================
    let activeCategory = 'الكل';
    let currentData = db;

    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    const categoryContainer = document.getElementById('categoryContainer');
    const resultsGrid = document.getElementById('resultsGrid');
    const modal = document.getElementById('detailModal');
    const modalContent = document.getElementById('modalContent');
    const modalClose = document.getElementById('modalClose');

    // عرض التصنيفات
    function renderCategories() {
        const cats = ['الكل', ...new Set(db.map(item => item.cat))];
        categoryContainer.innerHTML = cats.map(cat => 
            `<div class="cat-chip ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">${cat}</div>`
        ).join('');

        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                activeCategory = this.dataset.cat;
                filterData();
                renderCategories();
            });
        });
    }

    // تصفية البيانات حسب البحث والفئة
    function filterData() {
        let filtered = db;
        if (activeCategory !== 'الكل') {
            filtered = filtered.filter(item => item.cat === activeCategory);
        }
        const term = searchInput.value.trim().toLowerCase();
        if (term !== '') {
            filtered = filtered.filter(item =>
                item.abbr.toLowerCase().includes(term) ||
                item.name.includes(term) ||
                (item.desc && item.desc.includes(term))
            );
            clearBtn.classList.add('visible');
        } else {
            clearBtn.classList.remove('visible');
        }
        currentData = filtered;
        renderGrid();
    }

    // عرض البطاقات
    function renderGrid() {
        if (currentData.length === 0) {
            resultsGrid.innerHTML = '<div class="no-results">لا توجد نتائج</div>';
            return;
        }
        resultsGrid.innerHTML = currentData.map(item => `
            <div class="card" data-abbr="${item.abbr}">
                <div class="card-header">
                    <span class="card-category">${item.cat}</span>
                    <i class="fas ${item.icon || 'fa-flask'} card-icon"></i>
                </div>
                <h3 class="card-abbr">${item.abbr}</h3>
                <p class="card-name">${item.name}</p>
                <div class="card-footer">
                    <span><i class="fas fa-thermometer-half"></i> ${item.range.substring(0, 20)}...</span>
                    <span><i class="fas fa-chevron-left"></i> التفاصيل</span>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('click', function() {
                const abbr = this.dataset.abbr;
                const item = db.find(i => i.abbr === abbr);
                if (item) openModal(item);
            });
        });
    }

    // فتح النافذة المنبثقة
    function openModal(item) {
        modalContent.innerHTML = `
            <div class="modal-header">
                <h2>${item.abbr}</h2>
                <h3>${item.name}</h3>
            </div>
            <div class="modal-section">
                <h4><i class="fas fa-microscope"></i> الوصف</h4>
                <p>${item.desc}</p>
            </div>
            <div class="modal-section">
                <h4><i class="fas fa-chart-bar"></i> النطاق المرجعي</h4>
                <div class="range-badge">${item.range}</div>
            </div>
            <div class="modal-section">
                <h4><i class="fas fa-vial"></i> التحضير</h4>
                <p>${item.prepare || 'لا توجد شروط خاصة'}</p>
            </div>
            <div class="modal-section treatment">
                <h4><i class="fas fa-capsules"></i> العلاج</h4>
                <div class="drug-suggestion">${item.drug || 'يعتمد على التشخيص'}</div>
            </div>
            ${item.advice && item.advice !== '---' ? `
            <div class="modal-section">
                <h4><i class="fas fa-lightbulb"></i> نصائح</h4>
                <p>${item.advice}</p>
            </div>` : ''}
            ${item.warning && item.warning !== '---' ? `
            <div class="modal-section warning">
                <h4><i class="fas fa-exclamation-triangle"></i> تحذير</h4>
                <p>${item.warning}</p>
            </div>` : ''}
            <div class="disclaimer">
                <i class="fas fa-balance-scale"></i> للأغراض التعليمية فقط، استشر طبيبك.
            </div>
        `;
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modal.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    // أحداث
    searchInput.addEventListener('input', function() {
        filterData();
        renderCategories();
    });

    clearBtn.addEventListener('click', function() {
        searchInput.value = '';
        activeCategory = 'الكل';
        filterData();
        renderCategories();
    });

    modalClose.addEventListener('click', closeModal);
    window.addEventListener('click', function(e) {
        if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
    });

    // بدء التطبيق
    renderCategories();
    renderGrid();
})();
</script>
</body>
</html>
